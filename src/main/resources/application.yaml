server:
  port: 8090
  servlet:
    context-path: /simple-ai

  compression:
    enabled: TRUE #Whether response compression is enabled. Default fasle

spring:
  application:
    name: simple-ai	

#  main:
#    web-application-type: NONE #if Web dependency is not added

  ai:
    ollama:
      base-url: ${AI_OLLAMA_URL:http://localhost:11434}

    anthropic:
      api-key: ${ANTHROPIC_API_KEY:ignore}
      base-url: ${ANTHROPIC_BASE_URL:https://api.anthropic.com}

    retry:
      max-attempts: ${AI_RETRY_ATTEMPT:3}


app:
  # AI Models Configuration
  ai:
    models:
      default-provider-model: ${DEFAULT_AI_PROVIDER_MODEL:OLLAMA_LLAMA3}
      providers:
        ollama:
          enabled: true
          default-temperature: 0.7
          max-tokens: 2048
        anthropic:
          enabled: ${ANTHROPIC_ENABLED:false}
          default-temperature: 0.7
          max-tokens: 4096

  conversation:
    cache:
      max-size: 1000
      ttl-minutes: 60
      max-messages-per-session: 50
