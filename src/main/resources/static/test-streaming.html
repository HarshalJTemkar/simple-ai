<!DOCTYPE html>
<html>
<head>
    <title>Spring AI Streaming Chat</title>
    <style>
        body { font-family: Arial, sans-serif; max-width: 800px; margin: 50px auto; }
        #messages { border: 1px solid #ccc; height: 400px; overflow-y: auto; padding: 20px; }
        #input { width: 80%; padding: 10px; }
        button { padding: 10px 20px; }
        .message { margin: 10px 0; }
        .user { color: blue; }
        .ai { color: green; }
        .token { display: inline; }
    </style>
</head>
<body>
    <h1>Spring AI Streaming Chat</h1>
    <div id="messages"></div>
    <input type="text" id="input" placeholder="Type your message..." />
    <button onclick="sendMessage()">Send</button>
    <button onclick="sendStreamingMessage()">Send (Streaming)</button>

    <script>
        const API_BASE = 'http://localhost:8090/simple-ai/api/v1/chat';
        const messagesDiv = document.getElementById('messages');
        const inputField = document.getElementById('input');

        function addMessage(text, className) {
            const div = document.createElement('div');
            div.className = 'message ' + className;
            div.textContent = text;
            messagesDiv.appendChild(div);
            messagesDiv.scrollTop = messagesDiv.scrollHeight;
            return div;
        }

        function addStreamingMessage(className) {
            const div = document.createElement('div');
            div.className = 'message ' + className;
            messagesDiv.appendChild(div);
            return div;
        }

        async function sendMessage() {
            const message = inputField.value.trim();
            if (!message) return;

            addMessage('You: ' + message, 'user');
            inputField.value = '';

            try {
                const response = await fetch(API_BASE, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ message })
                });

                const data = await response.json();
                addMessage('AI: ' + data.response, 'ai');
            } catch (error) {
                addMessage('Error: ' + error.message, 'error');
            }
        }

        function sendStreamingMessage() {
            const message = inputField.value.trim();
            if (!message) return;

            addMessage('You: ' + message, 'user');
            inputField.value = '';

            const aiMessageDiv = addStreamingMessage('ai');
            aiMessageDiv.textContent = 'AI: ';

            const eventSource = new EventSource(
                API_BASE + '/stream?' + new URLSearchParams({ message })
            );

            eventSource.onmessage = (event) => {
                const data = JSON.parse(event.data);
                
                if (data.done) {
                    eventSource.close();
                    //aiMessageDiv.textContent += ` [${data.tokenCount} tokens]`;
                    console.log('Streaming completed');
                } else {
                    const span = document.createElement('span');
                    span.className = 'token';
                    span.textContent = data.content;
                    aiMessageDiv.appendChild(span);
                    messagesDiv.scrollTop = messagesDiv.scrollHeight;
                }
            };

            eventSource.onerror = (error) => {
                eventSource.close();
                addMessage('Streaming error occurred', 'error');
            };
        }

        inputField.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') sendStreamingMessage();
        });
    </script>
</body>
</html>
